name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.IPFUNDO }}
          script: |
            cd ${{ secrets.VPS_PATH }}

            echo "📥 Pulling latest code..."
            git pull origin main

            echo "📦 Installing dependencies..."
            npm install

            echo "🧬 Generating Prisma..."
            npx prisma generate

            echo "🏗️ Building app..."
            npm run build

            echo "🔁 Restarting PM2..."
            pm2 restart ipfundo
